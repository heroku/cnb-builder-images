# TODO: Update this description to match the other builders once all remaining CNBs have been added.
description = "Experimental Ubuntu 26.04 AMD64+ARM64 base image with buildpacks for .NET, Go, Java, Node.js & Scala."

[stack]
id = "heroku-26"
build-image = "docker.io/heroku/heroku:26-build"
run-image = "docker.io/heroku/heroku:26"
run-image-mirrors = ["public.ecr.aws/heroku/heroku:26"]

[lifecycle]
version = "0.21.6"

[build]
image = "docker.io/heroku/heroku:26-build"

[run]
[[run.images]]
image = "docker.io/heroku/heroku:26"
mirrors = ["public.ecr.aws/heroku/heroku:26"]

