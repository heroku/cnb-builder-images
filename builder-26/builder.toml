# TODO: Update this description to match the other builders once all remaining CNBs have been added.
description = "Experimental Ubuntu 26.04 AMD64+ARM64 base image with buildpacks for .NET, Go, Java, Node.js, PHP, Python & Scala."

[stack]
id = "heroku-26"
build-image = "docker.io/heroku/heroku:26-build"
run-image = "docker.io/heroku/heroku:26"
run-image-mirrors = ["public.ecr.aws/heroku/heroku:26"]

[lifecycle]
version = "0.21.8"

[build]
image = "docker.io/heroku/heroku:26-build"

[run]
[[run.images]]
image = "docker.io/heroku/heroku:26"
mirrors = ["public.ecr.aws/heroku/heroku:26"]

[[buildpacks]]
  id = "heroku/deb-packages"
  uri = "docker://docker.io/heroku/buildpack-deb-packages@sha256:282783174259d1559e1f2e068d2db46281557c3cc71eba4f76b6b1bf1ae7dd4e"

[[buildpacks]]
  id = "heroku/dotnet"
  uri = "docker://docker.io/heroku/buildpack-dotnet@sha256:6e30faadeecf5b492cdc797cd2aac8e117aabbc4cda1d9715a62a65915daef84"

[[buildpacks]]
  id = "heroku/go"
  uri = "docker://docker.io/heroku/buildpack-go@sha256:a2c2e0ef33f952855eff4b7da1c126bad260b798a32587b06dfb82dc5672aa1f"

[[buildpacks]]
  id = "heroku/java"
  uri = "docker://docker.io/heroku/buildpack-java@sha256:ffcec832e829f935031a23103b7cdf30072e98dfe720afc66aea700eeeb2101f"

[[buildpacks]]
  id = "heroku/nodejs"
  uri = "docker://docker.io/heroku/buildpack-nodejs@sha256:1c788b57fc136e3d31cb4041512ee40bea7d8ebaca4785793a6962f22933ad88"

[[buildpacks]]
  id = "heroku/php"
  uri = "docker://docker.io/heroku/buildpack-php@sha256:772b559530762c66703f59f58aff75bba60ff7d954ae87db524f6f5c8c52a42b"

[[buildpacks]]
  id = "heroku/procfile"
  uri = "docker://docker.io/heroku/buildpack-procfile@sha256:df5cf3fe9e25ac7956d3d4b77844e4d23fc182ef0de49599c2ec4e3b17316448"

[[buildpacks]]
  id = "heroku/python"
  uri = "docker://docker.io/heroku/buildpack-python@sha256:50a65566a06386f73ee0858384ed6602d44d916b4c3d3ec2904c4389712a0884"

